<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Demo margin padding</title>
</head>
<body>
    <h1>Demo Padding et Margin CSS</h1>

    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
    </div>

    <div class="param">
        <label for="padding">Padding</label>
        <input type="range" name="padding" id="padding" value="0">
        <Label for="margin">Margin</Label>
        <input type="range" name="margin" id="margin" value="0">
        <Label for="border">Border</Label>
        <input type="range" name="border" id="border" value="0">
        <Label for="radius">Border radius</Label>
        <input type="range" name="radius" id="radius" value="0">
    </div>

    <div class="css-code">
        .box {
        <div>
            <div class="prop">padding: <span class="valDim" id="paddingval">0</span><span class="dim">px;</span></div>
            <div class="prop">margin: <span class="valDim" id="marginval">0</span><span class="dim">px;</span></div>
            <div class="prop">border: <span class="valDim" id="borderval">1</span><span class="dim">px solid black;</span></div>
            <div class="prop">border-radius: <span class="valDim" id="radiusval">10</span><span class="dim">px;</span></div>
        </div>
        }
    </div>

    <script>

        const padding = document.getElementById('padding');
        const margin = document.getElementById('margin');
        const border = document.getElementById('border');
        const radius = document.getElementById('radius');

        const paddingVal = document.getElementById('paddingval');
        const marginVal = document.getElementById('marginval');
        const borderVal = document.getElementById('borderval');
        const radiusVal = document.getElementById('radiusval');

        const box = document.querySelectorAll('.box');

        padding.addEventListener('input', function(){
            box[0].style.padding = padding.value + 'px';
            box[1].style.padding = padding.value + 'px';

            paddingVal.textContent = padding.value + 'px';
        })

        margin.addEventListener('input', function(){
            box[0].style.margin = margin.value + 'px';
            box[1].style.margin = margin.value + 'px';
            
            marginVal.textContent = margin.value + 'px';
        })

        border.addEventListener('input', function(){
            box[0].style.border = (parseInt(border.value) + 1) + "px solid black";
            box[1].style.border = (parseInt(border.value) + 1) + "px solid black";

            borderVal.textContent = (parseInt(border.value) + 1) + "px solid black";
        })

        radius.addEventListener('input', function(){
            box[0].style.borderRadius  = (10 + parseInt(radius.value)) + "px";
            box[1].style.borderRadius  = (10 + parseInt(radius.value)) + "px";
        })
    </script>
</body>
</html>
